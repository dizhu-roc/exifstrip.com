<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="currentColor" opacity="0.7"/>
    </marker>
    <style>
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 1.5; }
      .main { fill: #e8e8e8; stroke: #444; }
      .text { font: 13px/1.4 sans-serif; fill: #333; }
      .small { font: 11px sans-serif; fill: #555; }
      .line { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <!-- Image file (JPEG/TIFF) -->
  <rect class="main" x="140" y="12" width="140" height="36" rx="4"/>
  <text class="text" x="210" y="34" text-anchor="middle">Image file</text>
  <text class="small" x="210" y="44" text-anchor="middle">(JPEG APP1 / TIFF)</text>
  <!-- Arrow down to 0th IFD -->
  <path class="line" d="M 210 52 L 210 72"/>
  <!-- 0th IFD -->
  <rect class="box main" x="120" y="72" width="180" height="44" rx="4"/>
  <text class="text" x="210" y="94" text-anchor="middle">0th IFD</text>
  <text class="small" x="210" y="108" text-anchor="middle">(main image file directory)</text>
  <!-- Arrows from 0th to Exif and GPS -->
  <path class="line" d="M 180 116 L 120 140 L 120 158"/>
  <path class="line" d="M 240 116 L 300 140 L 300 158"/>
  <!-- Exif sub-IFD -->
  <rect class="box" x="20" y="158" width="160" height="52" rx="4"/>
  <text class="text" x="100" y="180" text-anchor="middle">Exif IFD</text>
  <text class="small" x="100" y="194" text-anchor="middle">0x8769</text>
  <text class="small" x="100" y="204" text-anchor="middle">(capture, device, date…)</text>
  <!-- Arrow from Exif to Interop -->
  <path class="line" d="M 100 210 L 100 230"/>
  <rect class="box" x="40" y="230" width="120" height="36" rx="4"/>
  <text class="text" x="100" y="250" text-anchor="middle">Interop IFD</text>
  <text class="small" x="100" y="262" text-anchor="middle">0xA005</text>
  <!-- GPS sub-IFD -->
  <rect class="box" x="240" y="158" width="160" height="52" rx="4"/>
  <text class="text" x="320" y="180" text-anchor="middle">GPS IFD</text>
  <text class="small" x="320" y="194" text-anchor="middle">0x8825</text>
  <text class="small" x="320" y="204" text-anchor="middle">(lat, lon, altitude…)</text>
</svg>
