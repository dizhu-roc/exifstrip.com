server {
    listen 443 ssl;
    http2 on;
    server_name exifstrip.com;
    ssl_certificate /etc/letsencrypt/live/exifstrip.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/exifstrip.com/privkey.pem; # managed by Certbot
    #include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";


    #ssl_stapling on;
    #ssl_stapling_verify on;
    #resolver 1.1.1.1 8.8.8.8 valid=300s;
    #resolver_timeout 5s;


    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;


    access_log /var/log/nginx/exifstrip.access.log;
    error_log  /var/log/nginx/exifstrip.error.log;

    # 反向代理 Next.js
    location / {
        proxy_pass http://127.0.0.1:3010;
	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 带 hash 的静态资源长期缓存
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 图片、字体等 public 下静态资源
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf)$ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=864000";  # 1 天，可按需调整
    }

}

# 80 端口：exifstrip.com 与 www.exifstrip.com 统一 301 到 https://exifstrip.com
server {
    listen 80;
    server_name exifstrip.com www.exifstrip.com;
    return 301 https://exifstrip.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    ssl_certificate /etc/letsencrypt/live/www.exifstrip.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.exifstrip.com/privkey.pem; # managed by Certbot
    #include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

    server_name www.exifstrip.com;
    return 301 https://exifstrip.com$request_uri;

}
